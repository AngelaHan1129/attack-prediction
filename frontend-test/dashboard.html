<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>攻擊意圖預測 - 戰情儀表板（亮色版）</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* 自訂亮色主題 */
    .bright-theme {
      --bg-primary: #f8fafc;
      --bg-secondary: #f1f5f9;
      --bg-card: #ffffff;
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --border-color: #e2e8f0;
    }
  </style>
</head>
<body class="bright-theme bg-gradient-to-br from-blue-50 via-indigo-50 to-purple-50 min-h-screen text-gray-800">

  <!-- 頂部導航 -->
  <div class="bg-white/80 backdrop-blur-md border-b border-blue-100 shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4">
      <div class="flex items-center justify-between">
        <div class="flex items-center space-x-4">
          <i class="fas fa-shield-alt text-blue-500 text-2xl shadow-lg"></i>
          <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent drop-shadow-lg">
            攻擊意圖預測系統
          </h1>
          <div class="flex space-x-2">
            <select class="bg-white border border-gray-200 px-4 py-2 rounded-xl text-sm shadow-sm hover:shadow-md transition-all focus:ring-2 focus:ring-blue-500">
              <option>🚉 車站A</option>
              <option>🛒 商圈B</option>
              <option>🏫 校園C</option>
            </select>
          </div>
        </div>
        <div class="flex items-center space-x-6 text-sm font-medium">
          <div class="flex items-center space-x-2 bg-orange-100 px-3 py-1 rounded-full text-orange-800">
            <div class="w-3 h-3 bg-orange-400 rounded-full animate-pulse"></div>
            <span>L3/L4事件: <strong>2/0</strong></span>
          </div>
          <div class="flex items-center space-x-1 bg-green-100 px-3 py-1 rounded-full text-green-800">
            <i class="fas fa-check-circle"></i>
            <span>處理率: <strong>100%</strong></span>
          </div>
          <span class="bg-white px-3 py-1 rounded-lg shadow-sm text-xs font-mono">19:32:15</span>
        </div>
      </div>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-6 py-8 grid grid-cols-1 lg:grid-cols-4 gap-8">
    
    <!-- 鏡頭網格 -->
    <div class="lg:col-span-3 space-y-6">
      <div class="flex items-center justify-between">
        <h2 class="text-2xl font-bold flex items-center text-gray-800">
          <i class="fas fa-video mr-3 text-blue-500 text-xl"></i>
          即時監視畫面
        </h2>
        <span class="px-4 py-2 bg-blue-100 text-blue-800 text-sm font-medium rounded-full">12路</span>
      </div>
      
      <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
        
        <!-- 高風險鏡頭 (L3) -->
        <div class="group relative bg-gradient-to-br from-orange-50 to-red-50 rounded-2xl overflow-hidden border-4 border-orange-400 shadow-2xl hover:shadow-3xl transition-all duration-300 animate-pulse">
          <div class="absolute top-4 left-4 z-20 bg-white/90 backdrop-blur-sm px-4 py-2 rounded-2xl text-xs font-bold shadow-lg border border-orange-200">
            <i class="fas fa-video text-orange-500 mr-2"></i>鏡頭01 (車站大廳)
          </div>
          <div class="w-full h-64 bg-gradient-to-br from-gray-200 to-gray-300 flex items-center justify-center rounded-b-2xl shadow-inner">
            <div class="text-center">
              <i class="fas fa-play-circle text-6xl text-gray-400 group-hover:text-blue-500 transition-all"></i>
              <div class="text-lg font-semibold text-gray-600 mt-3">即時串流 1080p</div>
              <div class="text-sm text-gray-500">30 FPS</div>
            </div>
          </div>
          <!-- 最高風險目標 -->
          <div class="absolute bottom-6 right-6 bg-gradient-to-r from-red-500 to-orange-500 text-white px-6 py-3 rounded-2xl shadow-2xl font-bold text-lg border-4 border-white/50 backdrop-blur-sm">
            <div>ID: 7</div>
            <div class="text-2xl">🟠 L3</div>
          </div>
          <!-- 風險分數 -->
          <div class="absolute top-4 right-4 w-16 h-16 bg-gradient-to-r from-orange-400 to-red-400 rounded-2xl flex flex-col items-center justify-center text-white font-bold text-lg shadow-2xl border-4 border-white">
            <div>0.82</div>
            <div class="text-xs">風險值</div>
          </div>
        </div>

        <!-- 正常鏡頭 -->
        <div class="relative bg-white rounded-2xl overflow-hidden border-2 border-gray-200 shadow-xl hover:shadow-2xl hover:border-blue-400 transition-all duration-300 hover:scale-[1.02]">
          <div class="absolute top-4 left-4 z-20 bg-white/90 px-3 py-2 rounded-xl text-xs font-bold shadow-sm border">
            <i class="fas fa-video text-green-500 mr-1"></i>鏡頭02 (月台)
          </div>
          <div class="w-full h-64 bg-gradient-to-br from-blue-50 to-indigo-50 flex items-center justify-center">
            <div class="text-center">
              <i class="fas fa-play-circle text-5xl text-gray-400 hover:text-blue-500 transition-all"></i>
            </div>
          </div>
          <div class="absolute bottom-6 right-6 bg-green-500/95 text-white px-4 py-2 rounded-xl shadow-lg font-bold text-sm border-2 border-white">
            ID: 12 🟢 L1
          </div>
        </div>

        <!-- 其他鏡頭 (複製調整顏色) -->
        <div class="relative bg-white rounded-2xl overflow-hidden border-2 border-gray-200 shadow-lg">...</div>
        <div class="relative bg-white rounded-2xl overflow-hidden border-2 border-gray-200 shadow-lg">...</div>
        <div class="relative bg-white rounded-2xl overflow-hidden border-2 border-gray-200 shadow-lg">...</div>
        <div class="relative bg-white rounded-2xl overflow-hidden border-2 border-gray-200 shadow-lg">...</div>
        <div class="relative bg-white rounded-2xl overflow-hidden border-2 border-gray-200 shadow-lg">...</div>
        <div class="relative bg-white rounded-2xl overflow-hidden border-2 border-gray-200 shadow-lg">...</div>
        <div class="relative bg-white rounded-2xl overflow-hidden border-2 border-gray-200 shadow-lg">...</div>
        <div class="relative bg-white rounded-2xl overflow-hidden border-2 border-gray-200 shadow-lg">...</div>
        <div class="relative bg-white rounded-2xl overflow-hidden border-2 border-gray-200 shadow-lg">...</div>
        <div class="relative bg-white rounded-2xl overflow-hidden border-2 border-gray-200 shadow-lg">...</div>
        <div class="relative bg-white rounded-2xl overflow-hidden border-2 border-gray-200 shadow-lg">...</div>

      </div>
    </div>

    <!-- 即時告警列表 -->
    <div class="space-y-6">
      <div class="flex items-center justify-between">
        <h2 class="text-2xl font-bold flex items-center text-gray-800">
          <i class="fas fa-exclamation-triangle mr-3 text-orange-500 text-xl"></i>
          即時告警
        </h2>
        <span class="bg-red-100 text-red-800 text-sm px-4 py-2 rounded-2xl font-semibold shadow-md">3 個</span>
      </div>
      
      <!-- L3 告警卡片 -->
      <div class="bg-gradient-to-br from-orange-50 to-red-50 border-4 border-orange-400 rounded-2xl p-6 shadow-2xl animate-bounce-in">
        <div class="flex items-start space-x-4">
          <div class="w-16 h-16 bg-gradient-to-br from-orange-400 to-red-400 rounded-2xl flex flex-col items-center justify-center text-white font-bold text-lg shadow-2xl border-4 border-white shrink-0">
            <div>🟠</div>
            <div>L3</div>
          </div>
          <div class="flex-1 pt-1">
            <div class="font-black text-xl mb-2 text-gray-900 flex items-center">
              鏡頭01 - 嫌疑人 ID: 7
            </div>
            <div class="text-lg font-mono text-gray-600 mb-4 bg-white px-3 py-2 rounded-xl shadow-inner">19:32:15</div>
            <div class="flex flex-wrap gap-2 mb-6">
              <span class="bg-orange-400/20 border-2 border-orange-400 text-orange-800 px-4 py-2 rounded-xl font-semibold text-sm shadow-md">
                X2 拳擊姿態 (0.89)
              </span>
              <span class="bg-red-400/20 border-2 border-red-400 text-red-800 px-4 py-2 rounded-xl font-semibold text-sm shadow-md">
                X6 距離侵略 (0.76)
              </span>
            </div>
            <div class="grid grid-cols-2 gap-3">
              <button class="bg-green-500 hover:bg-green-600 text-white px-6 py-3 rounded-xl font-bold text-lg shadow-lg hover:shadow-xl transform hover:-translate-y-1 transition-all duration-200 flex items-center justify-center">
                <i class="fas fa-check mr-2"></i>標記已處理
              </button>
              <button class="bg-gradient-to-r from-orange-500 to-red-500 hover:from-orange-600 hover:to-red-600 text-white px-6 py-3 rounded-xl font-bold text-lg shadow-lg hover:shadow-xl transform hover:-translate-y-1 transition-all duration-200 flex items-center justify-center">
                <i class="fas fa-exclamation-triangle mr-2"></i>緊急升級
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- L2 告警卡片 -->
      <div class="bg-gradient-to-r from-yellow-50 to-orange-50 border-3 border-yellow-400 rounded-2xl p-5 shadow-xl hover:shadow-2xl transition-all">
        <div class="flex items-start space-x-3">
          <div class="w-14 h-14 bg-yellow-400 rounded-xl flex items-center justify-center text-white font-bold text-lg shadow-lg border-3 border-white">
            🟡 L2
          </div>
          <div class="flex-1">
            <div class="font-bold text-lg mb-2 text-gray-900">鏡頭05 - ID: 23</div>
            <div class="text-sm text-gray-600 mb-3">19:28:42</div>
            <div class="flex gap-2 mb-4">
              <span class="bg-yellow-400/20 border border-yellow-400 text-yellow-800 px-3 py-1 rounded-lg font-medium text-sm">
                X4 徘徊
              </span>
            </div>
            <button class="w-full bg-emerald-500 hover:bg-emerald-600 text-white px-5 py-3 rounded-xl font-bold shadow-lg hover:shadow-xl transition-all flex items-center justify-center">
              <i class="fas fa-check mr-2"></i>已處理
            </button>
          </div>
        </div>
      </div>

      <!-- 無告警狀態 -->
      <div class="text-center py-12 bg-white/50 rounded-2xl border-2 border-dashed border-gray-300">
        <i class="fas fa-bell-slash text-5xl text-green-400 mb-4"></i>
        <div class="text-2xl font-bold text-gray-600 mb-2">無活躍告警</div>
        <div class="text-gray-500">系統正常運作中</div>
      </div>
    </div>
  </div>

  <script>
    // 模擬告警動畫
    setTimeout(() => {
      const newAlert = document.createElement('div');
      newAlert.innerHTML = `
        <div class="bg-gradient-to-br from-orange-50 to-red-50 border-4 border-orange-400 rounded-2xl p-6 shadow-2xl animate-bounce-in">
          <!-- 複製上面的 L3 告警卡片內容 -->
        </div>
      `;
      newAlert.querySelector('.animate-bounce-in').classList.add('animate-bounce-in');
      document.querySelector('.space-y-6').insertBefore(newAlert.firstElementChild, document.querySelector('.space-y-6 > div:nth-child(2)'));
    }, 3000);

    // 實時時鐘
    function updateClock() {
      const now = new Date();
      const timeString = now.toLocaleTimeString('zh-TW', { 
        hour12: false, 
        hour: '2-digit', 
        minute: '2-digit', 
        second: '2-digit' 
      });
      document.querySelector('span:last-child').textContent = timeString;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // 自訂動畫
    const style = document.createElement('style');
    style.textContent = `
      @keyframes bounce-in {
        0% { transform: scale(0.8) translateY(20px); opacity: 0; }
        60% { transform: scale(1.05); opacity: 1; }
        100% { transform: scale(1) translateY(0); }
      }
      .animate-bounce-in {
        animation: bounce-in 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      }
      .group:hover .text-gray-400 { color: #3b82f6 !important; }
    `;
    document.head.appendChild(style);
  </script>

</body>
</html>
