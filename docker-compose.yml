version: '3.8'
services:
  backend:
    build: ./backend
    ports: ["8000:8000"]
    volumes: ['./backend:/app']
    env_file: .env
    depends_on: [db]
  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    volumes: ['./frontend:/app']
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
